<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>当日バッジ確認｜Let’s Enjoy!</title>
  <link rel="stylesheet" href="./asset/css/setting.css">
  <link rel="stylesheet" href="./asset/css/layout.css">
  <link rel="stylesheet" href="./asset/css/style.css">
  <link rel="stylesheet" href="./asset/css/nagomi.css?v=day2">
  <style>
    body{
      min-width:0 !important;
      margin:0;
      background:#ececec;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:2rem;
      box-sizing:border-box;
    }
    #page_top #fv{
      position:relative;
      min-height:0;
      height:auto;
      overflow:visible;
      background:transparent;
      width:100%;
      max-width:42rem;
    }
    #page_top #fv .badge.m_box_badge{
      position:relative;
      width:100%;
      margin:0 auto;
    }
    .preview-note{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      padding:1.2rem;
      text-align:center;
      font-size:1.3rem;
      background:rgba(255,255,255,.92);
      border-top:.1rem solid #ccc;
    }
    .preview-note a{ text-decoration:underline; }
  </style>
</head>
<body>
  <div id="page_top">
    <section id="fv">
      <div class="badge m_box_badge is-day">
        <h3 class="hd nagomi-badge-hd">合宿まで</h3>
        <div id="countdown" class="nagomi-count is-day" aria-live="polite">
          <div class="count-remain" hidden aria-hidden="true">
            <p class="remain-label">あと</p>
            <p class="remain"><em class="digit">11</em><span class="unit">日</span></p>
          </div>
          <div class="count-enjoy" aria-hidden="false">
            <p class="enjoy-line">Let’s</p>
            <p class="enjoy-main">Enjoy!</p>
          </div>
        </div>
      </div>
    </section>
  </div>
  <p class="preview-note">当日表示の確認ページです。　<a href="./?v=day2">通常のLPへ戻る</a></p>
</body>
</html>
